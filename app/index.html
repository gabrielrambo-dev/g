<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CodeStudy Pro Desktop</title>
<style>
:root{--bg:#060816;--panel:#101827;--panel2:#172033;--text:#f8fafc;--muted:#aeb8c9;--brand:#7c3aed;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--line:#2a3550}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{padding-bottom:88px}
.app{max-width:1100px;margin:auto}.top{position:sticky;top:0;z-index:8;background:rgba(6,8,22,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px}.top h1{margin:0;font-size:1.12rem}.top p{margin:4px 0 0;color:var(--muted);font-size:.8rem}
.wrap{padding:12px}.hero{border:1px solid var(--line);border-radius:24px;padding:18px;background:linear-gradient(135deg,#29135c,#101827 70%);box-shadow:0 20px 60px rgba(0,0,0,.25)}.hero h2{margin:0 0 8px;font-size:1.48rem}p,li{line-height:1.6;color:#d7deea}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.16)}.card h2,.card h3{margin-top:0}
.badge{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);background:rgba(124,58,237,.16);color:#ddd6fe;border-radius:999px;padding:6px 9px;font-size:.78rem}.muted{color:var(--muted)}.small{font-size:.82rem}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:11px 13px;font-weight:800;cursor:pointer}.btn.primary{background:var(--brand);border-color:transparent}.btn.ok{background:var(--ok);border-color:transparent;color:#052e16}.btn.warn{background:var(--warn);border-color:transparent;color:#2b1700}.btn.bad{background:var(--bad);border-color:transparent}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.progress{height:10px;background:#091020;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:10px 0}.progress span{height:100%;display:block;background:linear-gradient(90deg,var(--brand),var(--ok))}
.list{display:grid;gap:8px;margin-top:12px}.item{width:100%;text-align:left;color:var(--text);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px}.item.done{border-color:rgba(34,197,94,.8)}.item small{display:block;margin-top:5px;color:var(--muted)}h2.section{font-size:1.08rem;margin:18px 0 10px}
.code{white-space:pre-wrap;overflow:auto;background:#020617;border:1px solid #334155;border-radius:16px;padding:14px;color:#e0f2fe;font-family:ui-monospace,Consolas,monospace;font-size:.86rem}textarea,input,select{width:100%;background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px}textarea{min-height:130px;font-family:inherit}.editor{min-height:240px;font-family:ui-monospace,Consolas,monospace}
.termgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}.term{background:#0b1220;border:1px solid var(--line);border-radius:14px;padding:11px}.term strong{display:block;color:#bfdbfe;margin-bottom:4px}
.feedback{border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:10px;white-space:pre-wrap}.good{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5)}.badbox{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.5)}.warnbox{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.45)}details{margin:8px 0}summary{font-weight:800;cursor:pointer}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(6,8,22,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;gap:4px;justify-content:center;padding:8px max(6px,env(safe-area-inset-left)) max(8px,env(safe-area-inset-bottom))}.nav{min-width:58px;flex:0 1 86px;border:0;background:transparent;color:var(--muted);font-weight:800;border-radius:14px;padding:8px 4px;font-size:.75rem}.nav.active{background:rgba(124,58,237,.24);color:white}
@media(max-width:700px){.grid{grid-template-columns:1fr}.wrap{padding:10px}.hero{border-radius:20px}.nav{min-width:auto;flex:1}}

@media (min-width: 960px) {
  body { padding-bottom: 0; padding-left: 112px; }
  .app { max-width: 1440px; }
  .top { left: 112px; }
  .bottom {
    top: 0;
    bottom: 0;
    left: 0;
    right: auto;
    width: 112px;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 14px 8px;
    border-top: 0;
    border-right: 1px solid var(--line);
  }
  .nav {
    flex: 0 0 auto;
    min-width: 0;
    width: 100%;
    min-height: 58px;
    font-size: .78rem;
  }
  .wrap { padding: 18px; }
  .hero { padding: 24px; }
  .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .editor { min-height: 340px; }
  textarea { min-height: 170px; }
}

</style>
</head>

const NVIDIA_ENDPOINT="https://integrate.api.nvidia.com/v1/chat/completions";
let state={view:'home',course:null,lesson:null,project:null};
let store={done:{},xp:0,streak:0,lastStudy:null,reviews:{},answers:{},goal:2,level:1};
try{store=Object.assign(store,JSON.parse(localStorage.getItem('cs10_store')||'{}'))}catch(e){localStorage.removeItem('cs10_store')}
const app=document.getElementById('app');
function save(){localStorage.setItem('cs10_store',JSON.stringify(store))}
function today(){return new Date().toISOString().slice(0,10)} 
function addDays(d,n){let x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function course(id){return DATA.courses.find(c=>c.id===id)}
function lesson(id){return DATA.lessons.find(l=>l.id===id)}
function project(id){return DATA.projects.find(p=>p.id===id)}
function currentLesson(){
  if(state.lesson) return lesson(state.lesson);
  if(state.course){
    const c=course(state.course);
    const nextId=(c.lessonIds||[]).find(id=>!store.done[id]) || (c.lessonIds||[])[0];
    return lesson(nextId);
  }
  return DATA.lessons.find(l=>!store.done[l.id]) || DATA.lessons[0];
}
function lessonContextText(l){
  if(!l) return 'Nenhuma aula selecionada.';
  const c=course(l.course)||{};
  return [
    'Curso: '+(c.name||l.course),
    'Aula: '+l.title,
    'Nível: '+l.level,
    'Objetivo: '+l.objective,
    'Onde usar: '+(l.where||[]).join(' | '),
    'Termos importantes: '+(l.terms||[]).join(', '),
    'Código da aula:\n'+l.code,
    'Exercícios: '+(l.exercises||[]).map(e=>e.q).join(' | '),
    'Desafio da aula: '+(l.challenge?l.challenge.task:'')
  ].join('\n\n');
}
function pct(c){let ids=c.lessonIds;return Math.round(ids.filter(id=>store.done[id]).length/ids.length*100)}
function allDone(){return Object.keys(store.done).length}
function level(){return Math.floor(store.xp/150)+1}
function setNav(){document.querySelectorAll('.nav').forEach(b=>b.classList.remove('active'));let map={home:0,course:0,lesson:0,study:1,projects:2,project:2,ai:3,progress:4};let b=document.querySelectorAll('.nav')[map[state.view]||0];if(b)b.classList.add('active')}
function go(v){state.view=v;render();scrollTo(0,0)}
function openCourse(id){state.course=id;state.view='course';render();scrollTo(0,0)}
function openLesson(id){state.lesson=id;state.view='lesson';render();scrollTo(0,0)}
function openProject(id){state.project=id;state.view='project';render();scrollTo(0,0)}
function completeLesson(id){let l=lesson(id);if(!store.done[id]){store.done[id]=today();store.xp+=(l.xp||25);scheduleReview(l);updateStreak();save()}render()}
function updateStreak(){let t=today(); if(store.lastStudy!==t){store.streak=(store.lastStudy===addDays(t,-1))?store.streak+1:1;store.lastStudy=t;}}
function scheduleReview(l){let t=today();(l.reviewDays||[1,3,7,15]).forEach(d=>{store.reviews[l.id+'_'+d]={lesson:l.id,date:addDays(t,d),done:false,day:d}})}
function dueReviews(){let t=today();return Object.values(store.reviews||{}).filter(r=>!r.done && r.date<=t)}
function home(){let total=DATA.lessons.length, comp=allDone();return `<div class="wrap"><section class="hero"><h2>Roadmap 10/10 + IA contextual</h2><p>Agora a IA entende a aula atual, tira dúvidas, explica e gera desafios personalizados. No PC, a navegação fica lateral e o editor fica maior para estudar e escrever código.</p><div class="grid"><div class="card"><strong>${comp}/${total}</strong><br><span class="muted">aulas concluídas</span></div><div class="card"><strong>${store.xp}</strong><br><span class="muted">XP</span></div><div class="card"><strong>Nível ${level()}</strong><br><span class="muted">sequência: ${store.streak||0} dia(s)</span></div></div></section><h2 class="section">Cursos</h2><div class="grid">${DATA.courses.map(c=>`<article class="card" onclick="openCourse('${c.id}')"><span class="badge">${c.emoji} ${c.name}</span><h3>${c.name}</h3><p>${c.desc}</p><div class="progress"><span style="width:${pct(c)}%"></span></div><small class="muted">${pct(c)}% • ${c.lessonIds.length} aulas</small></article>`).join('')}</div></div>`}
function courseView(){let c=course(state.course)||DATA.courses[0];return `<div class="wrap"><div class="row"><button class="btn" onclick="go('home')">← Voltar</button><span class="badge">${c.emoji} ${c.name}</span></div><section class="card" style="margin-top:12px"><h2>${c.name}</h2><p>${c.desc}</p><div class="progress"><span style="width:${pct(c)}%"></span></div></section><h2 class="section">Aulas</h2><div class="list">${c.lessonIds.map(id=>{let l=lesson(id);return `<button class="item ${store.done[id]?'done':''}" onclick="openLesson('${id}')"><strong>${store.done[id]?'✓ ':''}${l.title}</strong><small>${l.level} • ${l.xp} XP • ${l.objective}</small></button>`}).join('')}</div></div>`}
function termHtml(l){return `<div class="termgrid">${l.terms.map(t=>`<div class="term"><strong>${esc(t)}</strong><p>${DATA.terms[t]||'Termo usado nesta aula. Pesquise, teste e anote com suas palavras.'}</p></div>`).join('')}</div>`}
function lessonView(){let l=lesson(state.lesson)||DATA.lessons[0],c=course(l.course);return `<div class="wrap"><div class="row"><button class="btn" onclick="openCourse('${c.id}')">← Aulas</button><span class="badge">${c.emoji} ${c.name}</span><span class="badge">${l.level}</span><span class="badge">${l.xp} XP</span></div><article class="card" style="margin-top:12px"><h2>${l.title}</h2><p><strong>Objetivo:</strong> ${l.objective}</p><h2 class="section">Onde usar</h2>${l.where.map(p=>`<p>${p}</p>`).join('')}<h2 class="section">Cada coisa importante</h2>${termHtml(l)}<h2 class="section">Código exemplo</h2><pre class="code">${esc(l.code)}</pre><h2 class="section">Como ler linha por linha</h2><ol>${l.lineByLine.map(x=>`<li>${x}</li>`).join('')}</ol><h2 class="section">Erros comuns</h2><ul>${l.commonMistakes.map(x=>`<li>${x}</li>`).join('')}</ul><h2 class="section">Exercícios</h2>${l.exercises.map((e,i)=>exerciseHtml(l,e,i)).join('')}<h2 class="section">Desafio da aula</h2><div class="feedback warnbox"><h3>${l.challenge.title}</h3><p>${l.challenge.task}</p><ul>${l.challenge.requirements.map(x=>`<li>${x}</li>`).join('')}</ul><textarea class="editor" id="lessonChallenge" placeholder="Escreva seu código/resposta aqui...">${localStorage.getItem('lesson_ch_'+l.id)||''}</textarea><div class="row" style="margin-top:8px"><button class="btn" onclick="saveLessonChallenge('${l.id}')">Salvar</button><button class="btn ok" onclick="checkLessonChallenge('${l.id}')">Verificar</button><button class="btn primary" onclick="askLessonAI('${l.id}')">Pedir ajuda IA</button></div><div id="lessonCheck"></div></div><h2 class="section">Anotações</h2><textarea oninput="localStorage.setItem('note_${l.id}',this.value)" placeholder="Resumo da aula com suas palavras...">${localStorage.getItem('note_'+l.id)||''}</textarea><div class="row" style="margin-top:12px"><button class="btn ok" onclick="completeLesson('${l.id}')">Concluir aula</button><button class="btn" onclick="go('study')">Revisões</button></div></article></div>`}
function exerciseHtml(l,e,i){let key=l.id+'_ex_'+i;let val=store.answers[key];if(e.kind==='multiple'){return `<details class="card"><summary>Questão ${i+1}: múltipla escolha</summary><p>${e.q}</p>${e.options.map((o,idx)=>`<button class="btn" style="margin:4px" onclick="store.answers['${key}']=${idx};save();render()">${val===idx?'✓ ':''}${o}</button>`).join('')}${val!==undefined?`<div class="feedback ${val===e.answer?'good':'badbox'}">${val===e.answer?'Correto.':'Errado. Revise a aula.'}</div>`:''}</details>`}return `<details class="card"><summary>Questão ${i+1}: ${e.kind}</summary><p>${e.q}</p><textarea oninput="localStorage.setItem('${key}',this.value)" placeholder="Responda aqui...">${localStorage.getItem(key)||''}</textarea><button class="btn" onclick="alert('Resposta salva. Compare com a aula ou peça revisão da IA.')">Salvar</button></details>`}
function saveLessonChallenge(id){localStorage.setItem('lesson_ch_'+id,document.getElementById('lessonChallenge').value)}
function checkLessonChallenge(id){let l=lesson(id),code=document.getElementById('lessonChallenge').value;saveLessonChallenge(id);let checks=l.challenge.checks||[];let low=code.toLowerCase();let found=checks.filter(x=>low.includes(String(x).toLowerCase()));let miss=checks.filter(x=>!low.includes(String(x).toLowerCase()));document.getElementById('lessonCheck').innerHTML=`<div class="feedback ${miss.length?'badbox':'good'}"><strong>${found.length}/${checks.length} itens detectados</strong>\nEncontrado: ${found.join(', ')||'nada'}\nFaltando: ${miss.join(', ')||'nada'}\nCorreção local é básica; a IA/professor faz análise melhor.</div>`}
function study(){let due=dueReviews();let suggested=DATA.lessons.find(l=>!store.done[l.id])||DATA.lessons[0];return `<div class="wrap"><section class="card"><h2>Estudo de hoje</h2><p>Meta diária: ${store.goal||2} aula(s). Revisões vencidas: ${due.length}.</p><div class="row"><button class="btn" onclick="setGoal()">Alterar meta</button><button class="btn primary" onclick="openLesson('${suggested.id}')">Próxima aula</button></div></section><h2 class="section">Revisão espaçada</h2><div class="list">${due.length?due.map(r=>{let l=lesson(r.lesson);return `<article class="card"><h3>${l.title}</h3><p>Revisão de ${r.day} dia(s), vencida em ${r.date}</p><button class="btn ok" onclick="finishReview('${l.id}','${r.day}')">Revisado</button><button class="btn" onclick="openLesson('${l.id}')">Abrir aula</button></article>`}).join(''):'<div class="card"><p>Nenhuma revisão vencida. Continue estudando.</p></div>'}</div></div>`}
function setGoal(){let n=parseInt(prompt('Meta diária de aulas:',store.goal||2)||'2'); if(n>0){store.goal=n;save();render()}}
function finishReview(id,day){let key=id+'_'+day;if(store.reviews[key])store.reviews[key].done=true;store.xp+=10;updateStreak();save();render()}
function projects(){return `<div class="wrap"><h2 class="section">Projetos guiados</h2><p class="muted">Projetos com etapas, editor e verificação local.</p><div class="list">${DATA.projects.map(p=>`<button class="item" onclick="openProject('${p.id}')"><strong>${p.title}</strong><small>${p.steps.length} etapas • ${course(p.course).name}</small></button>`).join('')}</div></div>`}
function projectView(){let p=project(state.project)||DATA.projects[0];return `<div class="wrap"><button class="btn" onclick="go('projects')">← Projetos</button><article class="card" style="margin-top:12px"><h2>${p.title}</h2><h3>Etapas guiadas</h3><ol>${p.steps.map(x=>`<li>${x}</li>`).join('')}</ol><textarea class="editor" id="projectCode" placeholder="Escreva/cole seu código aqui...">${localStorage.getItem('project_'+p.id)||''}</textarea><div class="row" style="margin-top:8px"><button class="btn" onclick="saveProject('${p.id}')">Salvar</button><button class="btn ok" onclick="checkProject('${p.id}')">Verificar requisitos</button><button class="btn primary" onclick="askProjectAI('${p.id}')">Revisar com IA</button></div><div id="projectOut"></div></article></div>`}
function saveProject(id){localStorage.setItem('project_'+id,document.getElementById('projectCode').value)}
function checkProject(id){let p=project(id),code=document.getElementById('projectCode').value;saveProject(id);let low=code.toLowerCase();let found=p.checks.filter(x=>low.includes(x.toLowerCase()));let miss=p.checks.filter(x=>!low.includes(x.toLowerCase()));document.getElementById('projectOut').innerHTML=`<div class="feedback ${miss.length?'badbox':'good'}"><strong>${found.length}/${p.checks.length} requisitos detectados</strong>\nEncontrado: ${found.join(', ')||'nada'}\nFaltando: ${miss.join(', ')||'nada'}</div>`}
function ai(){
  let key=localStorage.getItem('nvidia_key')||'',model=localStorage.getItem('nvidia_model')||'nvidia/nemotron-3-nano-30b-a3b';
  let l=currentLesson(), c=course(l.course)||{};
  return `<div class="wrap">
    <section class="card">
      <h2>IA da aula</h2>
      <p>Use para tirar dúvidas, explicar a aula atual e gerar desafios personalizados. A IA recebe o contexto da aula selecionada.</p>
      <div class="feedback warnbox"><strong>Contexto atual:</strong><br>${c.emoji||''} ${c.name||''} • ${l.title}<br><span class="muted">${l.objective}</span></div>
      <label>API Key NVIDIA</label>
      <input id="apiKey" type="password" value="${esc(key)}" placeholder="Cole sua API Key">
      <label>Modelo</label>
      <input id="model" value="${esc(model)}">
      <div class="row" style="margin-top:8px">
        <button class="btn" onclick="saveAI()">Salvar</button>
        <button class="btn warn" onclick="clearAI()">Apagar</button>
      </div>
    </section>

    <section class="card" style="margin-top:12px">
      <h3>Ações rápidas da IA</h3>
      <div class="row">
        <button class="btn primary" onclick="quickAI('duvida')">Tirar dúvida</button>
        <button class="btn ok" onclick="quickAI('explicar')">Explicar aula</button>
        <button class="btn warn" onclick="quickAI('desafio')">Gerar desafio personalizado</button>
        <button class="btn" onclick="quickAI('corrigir')">Corrigir meu código</button>
      </div>
      <p class="muted small">A IA deve dar dicas e explicar. No modo desafio/correção, ela é orientada a não entregar tudo pronto.</p>
    </section>

    <section class="card" style="margin-top:12px">
      <h3>Sua pergunta ou código</h3>
      <textarea id="aiPrompt" placeholder="Ex: não entendi quando usar int e double...">${localStorage.getItem('ai_prompt')||''}</textarea>
      <button class="btn primary" onclick="sendAI()">Enviar com contexto da aula</button>
      <div id="aiOut" class="feedback"></div>
    </section>
  </div>`
}
function saveAI(){localStorage.setItem('nvidia_key',document.getElementById('apiKey').value.trim());localStorage.setItem('nvidia_model',document.getElementById('model').value.trim());alert('IA salva.')}
function clearAI(){localStorage.removeItem('nvidia_key');alert('Chave apagada.');render()}
function askLessonAI(id){let l=lesson(id);localStorage.setItem('ai_prompt',`Explique esta aula para iniciante: ${l.title}. Código:\n${l.code}\nExplique cada termo, onde usar, erros comuns e me dê 3 exercícios sem resolver.`);go('ai')}
function askProjectAI(id){let p=project(id),code=document.getElementById('projectCode')?.value||'';localStorage.setItem('ai_prompt',`Revise meu projeto ${p.title}. Etapas: ${p.steps.join(', ')}. Código:\n${code}\nDê feedback, erros, dicas e melhorias. Não faça tudo por mim.`);go('ai')}
function buildAIPrompt(mode,userText){
  const l=currentLesson();
  const ctx=lessonContextText(l);
  const base='Você está ajudando o aluno dentro de uma aula específica do app CodeStudy Pro. Use o contexto da aula. Responda em PT-BR, de forma direta e didática. Não invente conteúdo fora do contexto sem avisar.\n\nCONTEXTO DA AULA:\n'+ctx+'\n\n';
  if(mode==='explicar'){
    return base+'Tarefa: explique esta aula de forma simples. Explique cada termo importante, cada parte do código, onde usar, erros comuns e dê um mini resumo final. Depois dê 3 exercícios sem resolver.';
  }
  if(mode==='desafio'){
    return base+'Tarefa: gere um desafio personalizado para esta aula. Crie: objetivo, história/situação real, requisitos obrigatórios, requisitos extras, critérios de correção e 3 dicas graduais. Não entregue o código pronto.';
  }
  if(mode==='corrigir'){
    return base+'Tarefa: revise o código/resposta do aluno abaixo. Aponte erros, melhorias, o que está certo, o próximo passo e dê dicas sem entregar tudo pronto.\n\nCÓDIGO/RESPOSTA DO ALUNO:\n'+(userText||'O aluno ainda não colou código.');
  }
  return base+'Dúvida do aluno: '+(userText||'Explique os pontos mais importantes desta aula e onde usar.');
}
function quickAI(mode){
  const box=document.getElementById('aiPrompt');
  const current=box?box.value.trim():'';
  localStorage.setItem('ai_prompt', buildAIPrompt(mode,current));
  render();
}
async function sendAI(){
  let key=localStorage.getItem('nvidia_key'),
      model=localStorage.getItem('nvidia_model')||'nvidia/nemotron-3-nano-30b-a3b',
      raw=document.getElementById('aiPrompt').value.trim(),
      out=document.getElementById('aiOut');

  const prompt = raw.startsWith('Você está ajudando') ? raw : buildAIPrompt('duvida', raw);
  localStorage.setItem('ai_prompt',raw);

  if(!key){
    out.className='feedback badbox';
    out.textContent='Coloque sua API Key NVIDIA primeiro.';
    return;
  }
  out.className='feedback';
  out.textContent='Chamando IA com contexto da aula atual...';

  try{
    let r=await fetch(NVIDIA_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model,
        temperature:0.35,
        max_tokens:1600,
        messages:[
          {role:'system',content:'Você é um professor de programação em PT-BR dentro de um app de estudo. Tire dúvidas, explique aulas e gere desafios personalizados. Seja direto, didático e não entregue projetos completos quando o aluno deve praticar.'},
          {role:'user',content:prompt}
        ]
      })
    });
    let txt=await r.text();
    if(!r.ok)throw new Error('HTTP '+r.status+' - '+txt.slice(0,500));
    let data=JSON.parse(txt);
    out.className='feedback good';
    out.textContent=data.choices?.[0]?.message?.content||txt;
  }catch(e){
    out.className='feedback badbox';
    out.textContent='Falhou: '+e.message+'\nPossíveis causas: chave inválida, modelo indisponível, internet, CORS/WebView ou API fora. O app offline continua funcionando.';
  }
}
function progress(){let comp=allDone(),total=DATA.lessons.length;return `<div class="wrap"><section class="card"><h2>XP e progresso</h2><p>Aulas: ${comp}/${total}</p><p>XP: ${store.xp} • Nível ${level()} • Sequência ${store.streak||0} dia(s)</p><div class="progress"><span style="width:${Math.round(comp/total*100)}%"></span></div></section><div class="grid">${DATA.courses.map(c=>`<article class="card"><h3>${c.emoji} ${c.name}</h3><div class="progress"><span style="width:${pct(c)}%"></span></div><small>${pct(c)}%</small></article>`).join('')}</div><button class="btn bad" style="margin-top:12px" onclick="if(confirm('Limpar tudo?')){localStorage.clear();location.reload()}">Limpar dados</button></div>`}
function render(){try{setNav();if(state.view==='course')app.innerHTML=courseView();else if(state.view==='lesson')app.innerHTML=lessonView();else if(state.view==='study')app.innerHTML=study();else if(state.view==='projects')app.innerHTML=projects();else if(state.view==='project')app.innerHTML=projectView();else if(state.view==='ai')app.innerHTML=ai();else if(state.view==='progress')app.innerHTML=progress();else app.innerHTML=home()}catch(e){app.innerHTML='<div class="wrap"><div class="feedback badbox"><h2>Erro interno</h2><p>'+esc(e.message)+'</p><button class="btn" onclick="localStorage.clear();location.reload()">Limpar e recarregar</button></div></div>'}}
render();
</script>
</body>
</html>
